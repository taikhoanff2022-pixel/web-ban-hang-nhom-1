<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cửa hàng trực tuyến - Sản phẩm &amp; Chatbot</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>🛒 Cửa hàng của bạn</h1>
        <p>Chào mừng đến với cửa hàng sản phẩm chất lượng!</p>
    </header>

    <main>
        <section id="products">
            <h2>Sản phẩm</h2>
            <div id="product-list">
                <!-- Sản phẩm sẽ được load bằng JS -->
            </div>
        </section>

        <section id="chatbot-section">
            <h2>Chatbot hỗ trợ</h2>
            <div id="chat-container">
                <div id="chat-messages"></div>
                <div id="chat-input-container">
                    <input type="text" id="chat-input" placeholder="Nhập tin nhắn của bạn...">
                    <button id="send-btn">Gửi</button>
                </div>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
