<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cửa hàng Online - Sản phẩm chất lượng</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="nav-container">
                <div class="logo">
                    <h2><i class="fas fa-store"></i> ShopVN</h2>
                </div>
                <ul class="nav-menu">
                    <li><a href="#home">Trang chủ</a></li>
                    <li><a href="#products">Sản phẩm</a></li>
                    <li><a href="#cart" id="cart-link"><i class="fas fa-shopping-cart"></i> Giỏ hàng (<span id="cart-count">0</span>)</a></li>
                </ul>
                <div class="hamburger">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
            </div>
        </nav>
    </header>

    <main>
        <section id="home" class="hero">
            <div class="hero-content">
                <h1>Chào mừng đến với ShopVN</h1>
                <p>Sản phẩm chất lượng cao, giá cả hợp lý. Chat ngay để được tư vấn!</p>
                <button class="cta-btn" onclick="openChatbot()">Chat với tư vấn viên</button>
            </div>
        </section>

        <section id="products" class="products">
            <div class="container">
                <h2>Danh sách sản phẩm</h2>
                <div id="product-grid" class="product-grid">
                    <!-- Products will be loaded by JS -->
                </div>
            </div>
        </section>

        <section id="cart" class="cart hidden">
            <div class="container">
                <h2>Giỏ hàng của bạn</h2>
                <div id="cart-items"></div>
                <div class="cart-total">
                    <h3>Tổng cộng: <span id="cart-total">0</span> VNĐ</h3>
                    <button id="checkout-btn" class="checkout-btn" onclick="goToCheckout()">Thanh toán</button>
                </div>
                <button onclick="closeCart()" class="close-cart-btn">Đóng giỏ hàng</button>
            </div>
        </section>
    </main>

    <!-- Chatbot -->
    <div id="chatbot" class="chatbot hidden">
        <div class="chatbot-header">
            <span>Tư vấn viên AI</span>
            <button onclick="closeChatbot()" class="close-chat">&times;</button>
        </div>
        <div id="chat-messages" class="chat-messages"></div>
        <div class="chat-input">
            <input type="text" id="chat-input" placeholder="Nhập tin nhắn của bạn..." onkeypress="sendMessage(event)">
            <button onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>

    <!-- Checkout Modal -->
    <div id="checkout-modal" class="modal hidden">
        <div class="modal-content">
            <span class="close-modal" onclick="closeCheckout()">&times;</span>
            <h2>Thanh toán</h2>
            <div id="checkout-items"></div>
            <div class="checkout-total">
                <h3>Tổng tiền: <span id="checkout-total">0</span> VNĐ</h3>
            </div>
            <form id="checkout-form">
                <input type="text" placeholder="Họ tên" required>
                <input type="tel" placeholder="Số điện thoại" required>
                <input type="email" placeholder="Email" required>
                <input type="text" placeholder="Địa chỉ giao hàng" required>
                <button type="submit">Xác nhận đơn hàng</button>
            </form>
        </div>
    </div>

    <script src="products.js"></script>
    <script src="script.js"></script>
    <script src="chatbot.js"></script>
</body>
</html>
