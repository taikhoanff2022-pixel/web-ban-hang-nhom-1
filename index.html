<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shop Điện Tử - Sản Phẩm Chính Hãng</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <nav>
      <div class="logo">🛒 ShopVN</div>
      <div>
        <button id="cartToggle" class="cart-btn">🛍️ Giỏ hàng (<span id="cartCount">0</span>)</button>
        <button id="chatToggle" class="chat-toggle">💬 Chat hỗ trợ</button>
      </div>
    </nav>
  </header>

  <main>
    <section class="hero">
      <h1>Chào mừng đến Shop Điện Tử!</h1>
      <p>Sản phẩm chính hãng, giá tốt nhất thị trường. Chat ngay để được tư vấn!</p>
    </section>

    <section>
      <h2 style="text-align: center; margin-bottom: 2rem; font-size: 2.5rem; color: #333;">Sản phẩm nổi bật</h2>
      <div id="productsGrid" class="products-grid"></div>
    </section>
  </main>

  <footer>
    <p>&copy; 2024 ShopVN. Tất cả quyền được bảo lưu. Hotline: 1900-xxxx</p>
  </footer>

  <!-- Cart Modal -->
  <div id="cartModal" class="modal">
    <div class="modal-content">
      <span class="close close-cart">&times;</span>
      <h2>Giỏ hàng của bạn</h2>
      <div id="cartItems"></div>
      <div class="cart-total" id="cartTotal">0 VNĐ</div>
      <button id="checkoutBtn" class="checkout-btn">Thanh toán</button>
    </div>
  </div>

  <!-- Chatbot -->
  <div id="chatbotContainer" class="chatbot-container">
    <div class="chatbot-header">
      <span>💬 Chat hỗ trợ - ShopVN</span>
      <span class="close close-chat">&times;</span>
    </div>
    <div id="chatMessages" class="chatbot-messages"></div>
    <div class="chatbot-input">
      <input type="text" id="chatInput" class="chat-input" placeholder="Nhập tin nhắn...">
      <button id="sendBtn" class="send-btn">▶</button>
    </div>
  </div>

  <script src="js/script.js"></script>
</body>
</html>
