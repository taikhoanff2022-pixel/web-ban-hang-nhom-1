<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thanh toán - ShopVN</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="nav-container">
                <div class="logo">
                    <h2><i class="fas fa-store"></i> ShopVN</h2>
                </div>
                <ul class="nav-menu">
                    <li><a href="index.html">Quay lại cửa hàng</a></li>
                </ul>
            </div>
        </nav>
    </header>

    <main class="checkout-page">
        <div class="container">
            <div class="checkout-header">
                <h1><i class="fas fa-credit-card"></i> Xác nhận đơn hàng</h1>
                <p>Thông tin chi tiết đơn hàng của bạn</p>
            </div>

            <div class="checkout-content">
                <!-- Cart items summary -->
                <div class="checkout-items-section">
                    <h3>Sản phẩm trong đơn hàng</h3>
                    <div id="checkout-items-list"></div>
                    <div class="checkout-total-line">
                        <span>Tổng tiền:</span>
                        <strong id="final-total">0 VNĐ</strong>
                    </div>
                </div>

                <!-- Customer info -->
                <div class="checkout-form-section">
                    <h3>Thông tin giao hàng</h3>
                    <form id="payment-form">
                        <div class="form-group">
                            <label>Họ và tên *</label>
                            <input type="text" id="customer-name" required>
                        </div>
                        <div class="form-group">
                            <label>Số điện thoại *</label>
                            <input type="tel" id="customer-phone" required>
                        </div>
                        <div class="form-group">
                            <label>Email *</label>
                            <input type="email" id="customer-email" required>
                        </div>
                        <div class="form-group">
                            <label>Địa chỉ giao hàng *</label>
                            <textarea id="customer-address" rows="3" required></textarea>
                        </div>
                        
                        <!-- Payment method -->
                        <div class="form-group">
                            <label>Phương thức thanh toán</label>
                            <div class="payment-methods">
                                <label class="payment-option">
                                    <input type="radio" name="payment" value="cod" checked>
                                    <i class="fas fa-money-bill-wave"></i> Thanh toán khi nhận hàng (COD)
                                </label>
                                <label class="payment-option">
                                    <input type="radio" name="payment" value="transfer">
                                    <i class="fas fa-university"></i> Chuyển khoản ngân hàng
                                </label>
                                <label class="payment-option">
                                    <input type="radio" name="payment" value="card">
                                    <i class="fas fa-credit-card"></i> Thẻ tín dụng/ghi nợ
                                </label>
                            </div>
                        </div>

                        <div class="form-group checkbox-group">
                            <label class="checkbox-label">
                                <input type="checkbox" id="terms" required>
                                Tôi đồng ý với <a href="#" onclick="alert('Chính sách bán hàng và bảo mật thông tin')">điều khoản dịch vụ</a>
                            </label>
                        </div>

                        <button type="submit" class="submit-order-btn">
                            <i class="fas fa-check"></i> ĐẶT HÀNG
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <script src="products.js"></script>
    <script src="checkout.js"></script>
</body>
</html>
